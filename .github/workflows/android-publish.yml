name: Build e Publicar APK Android

on:
  push:
    branches: [main]
    paths:
      # Só roda quando muda algo no projeto Android
      - 'android/app/**'
      - 'android/build.gradle'
      - 'android/settings.gradle'
      - 'android/gradle/**'
      - '.github/workflows/android-publish.yml'

  # Disparar manualmente pelo GitHub Actions UI
  workflow_dispatch:
    inputs:
      track:
        description: 'Track de publicação no Play Store'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_notes:
        description: 'Notas da release (pt-BR)'
        required: false
        default: 'Nova versão com melhorias e correções.'

jobs:
  build-and-publish:
    name: Build APK → Play Store
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 21 ───────────────────────────────────────────────────────────
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Cache Gradle ──────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 4. Decodificar Keystore ──────────────────────────────────────────────
      - name: Decodificar Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/rotaposto-keystore.jks
          echo "✅ Keystore decodificada: $(wc -c < android/rotaposto-keystore.jks) bytes"

      # ── 5. Build AAB (Android App Bundle) ──────────────────────────────────
      - name: Build AAB Release
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # ── 6. Verificar AAB ─────────────────────────────────────────────────────
      - name: Verificar AAB gerado
        id: apk_info
        working-directory: android
        run: |
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          ls -lh "$AAB_PATH"
          VERSION_NAME=$(grep 'versionName' app/build.gradle | grep -v '//' | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle | grep -v '//' | head -1 | sed 's/[^0-9]//g')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "📦 versionName=$VERSION_NAME versionCode=$VERSION_CODE"

      # ── 7. Salvar AAB como Artifact ──────────────────────────────────────────
      - name: Upload AAB como Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rotaposto-v${{ steps.apk_info.outputs.version_name }}.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 60

      # ── 8. Instalar dependências Python ──────────────────────────────────────
      - name: Instalar dependências Python (Google Play API)
        run: pip install google-auth google-api-python-client --quiet

      # ── 9. Publicar no Play Store ────────────────────────────────────────────
      - name: Publicar no Play Store
        working-directory: android
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          TRACK="${{ github.event.inputs.track || 'internal' }}"
          NOTES="${{ github.event.inputs.release_notes || 'Nova versão com melhorias e correções.' }}"
          python3 scripts/publish_aab.py \
            --aab app/build/outputs/bundle/release/app-release.aab \
            --track "$TRACK" \
            --release-notes "$NOTES"

      # ── 10. Resumo no GitHub Actions ─────────────────────────────────────────
      - name: Resumo da publicação
        run: |
          echo "## ✅ RotaPosto APK Publicado!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Versão** | ${{ steps.apk_info.outputs.version_name }} (code ${{ steps.apk_info.outputs.version_code }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Track** | ${{ github.event.inputs.track || 'internal' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Data** | $(date '+%d/%m/%Y %H:%M') UTC |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[🎮 Ver no Play Console](https://play.google.com/console/u/0/developers/)" >> $GITHUB_STEP_SUMMARY
