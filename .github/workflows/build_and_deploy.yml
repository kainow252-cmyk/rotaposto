name: Build Flutter & Deploy Play Store

on:
  # SOMENTE dispatch manual — push automático consumia versionCode no internal
  # antes do dispatch para rota, causando "Version code already been used"
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'rota'
        type: choice
        options:
          - rota
          - internal
          - alpha
          - beta
          - production

# Limita a 1 run por vez no mesmo grupo — evita OutOfMemoryError por runs paralelos
concurrency:
  group: rotaposto-deploy
  cancel-in-progress: false

jobs:
  build_and_deploy:
    name: Build AAB & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Flutter ───────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.4'
          channel: 'stable'
          cache: true

      # ── 4. Dependências ──────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 5. Restaurar Keystore ────────────────────────────────────
      - name: Restore keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/rotaposto-keystore.jks
          echo "Keystore restaurada: $(ls -lh android/app/rotaposto-keystore.jks)"

      # ── 6. Criar key.properties ──────────────────────────────────
      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=rotaposto-keystore.jks
          EOF

      # ── 7. Build AAB ─────────────────────────────────────────────
      - name: Build App Bundle (AAB)
        run: |
          flutter build appbundle \
            --release \
            --no-tree-shake-icons
        env:
          # Runner ubuntu-latest tem 7GB RAM; reservamos 5GB para o Gradle+D8
          GRADLE_OPTS: "-Xmx5g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError"
          # Limitar paralelismo interno do Gradle para não estourar heap
          ORG_GRADLE_PROJECT_android.enableR8.fullMode: "false"

      # ── 8. Verificar AAB gerado ──────────────────────────────────
      - name: Verify AAB
        run: |
          AAB_PATH="build/app/outputs/bundle/release/app-release.aab"
          ls -lh "$AAB_PATH"
          echo "✅ AAB gerado com sucesso!"

      # ── 9. Upload artefato ───────────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rotaposto-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      # ── 10. Publicar na Play Store ───────────────────────────────
      # changesNotSentForReview REMOVIDO — o Google Play retorna erro
      # "Changes are sent for review automatically. The query parameter
      #  changesNotSentForReview must not be set." em todos os tracks
      # deste app (internal, rota, alpha, beta, production).
      - name: Publish to Play Store
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: br.com.rotaposto.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          whatsNewDirectory: .github/whatsnew/

      - name: Deploy summary
        run: |
          echo "## 🚀 Deploy concluído!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **App** | RotaPosto |" >> $GITHUB_STEP_SUMMARY
          echo "| **Package** | br.com.rotaposto.app |" >> $GITHUB_STEP_SUMMARY
          echo "| **Track** | ${{ github.event.inputs.track || 'internal' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
