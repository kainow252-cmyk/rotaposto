name: Build e Publicar APK no Play Store

on:
  push:
    branches: [main]
    paths:
      # Só roda quando muda código relevante
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - '.github/workflows/build-and-publish.yml'

  # Permite rodar manualmente pelo GitHub Actions UI
  workflow_dispatch:
    inputs:
      track:
        description: 'Track de publicação'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_notes:
        description: 'Notas da release'
        required: false
        default: 'Nova versão com melhorias e correções.'

jobs:
  build-and-publish:
    name: Build APK e Publica no Play Store
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Configurar Java 21
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Cache do Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Permissão no gradlew
      - name: Permissão gradlew
        run: chmod +x gradlew

      # 5. Decodificar keystore do secret Base64
      - name: Decodificar Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > rotaposto-keystore.jks
          echo "✅ Keystore decodificada"

      # 6. Build APK release assinado
      - name: Build APK Release
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ../rotaposto-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 7. Listar APK gerado
      - name: Verificar APK
        run: |
          ls -lh app/build/outputs/apk/release/
          echo "versionName=$(grep versionName app/build.gradle | head -1 | tr -d ' ' | cut -d'"' -f2)" >> $GITHUB_OUTPUT
        id: apk_info

      # 8. Upload como artifact (backup para download manual se necessário)
      - name: Upload APK como Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rotaposto-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # 9. Instalar dependências Python para publicação
      - name: Instalar dependências Python
        run: pip install google-auth google-api-python-client --quiet

      # 10. Publicar no Play Store
      - name: Publicar no Play Store
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          TRACK="${{ github.event.inputs.track || 'internal' }}"
          NOTES="${{ github.event.inputs.release_notes || 'Nova versão com melhorias e correções.' }}"
          python3 scripts/publish_apk.py \
            --apk app/build/outputs/apk/release/app-release.apk \
            --track "$TRACK" \
            --release-notes "$NOTES"

      # 11. Resumo no GitHub Actions UI
      - name: Resumo da publicação
        run: |
          echo "## ✅ APK Publicado com Sucesso!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Package | br.com.rotaposto.app |" >> $GITHUB_STEP_SUMMARY
          echo "| Track | ${{ github.event.inputs.track || 'internal' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rodou em | $(date '+%d/%m/%Y %H:%M') UTC |" >> $GITHUB_STEP_SUMMARY
