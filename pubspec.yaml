name: rotaposto
description: RotaPosto - Encontre os melhores postos de combustível perto de você
publish_to: 'none'
version: 2.1.5+58

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # GPS nativo direto — sem WebView, sem TWA, sem PWA
  geolocator: 13.0.2

  # HTTP para chamar a API real do RotaPosto
  http: 1.5.0

  # Storage local (preferências, histórico de buscas)
  shared_preferences: 2.5.3

  # Abrir Google Maps externo para navegação (sem SDK, sem API key)
  url_launcher: 6.3.1

  # Permissões nativas (localização)
  permission_handler: 11.4.0

  # UI
  cached_network_image: 3.4.1
  shimmer: 3.0.0

  cupertino_icons: 1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
