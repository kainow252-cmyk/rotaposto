name: rotaposto
description: RotaPosto - Encontre os melhores postos de combustível
publish_to: 'none'
version: 2.0.1+52

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # GPS nativo direto - sem limitações TWA
  geolocator: ^13.0.1

  # Google Maps nativo
  google_maps_flutter: ^2.9.0

  # HTTP requests
  http: ^1.2.0

  # Storage local
  shared_preferences: ^2.3.2

  # Firebase Auth
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  flutter_rating_bar: ^4.0.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
